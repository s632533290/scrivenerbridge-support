      'en': {n:'English',t:'Mobile writing for Scrivener',s:'Continue real .scriv projects on iPhone and iPad.',ol:'Product',ot:'Bring Scrivener projects to mobile',o:'ScrivenerBridge opens real .scriv projects directly, so long-form writing stays clear, organised, and practical on mobile.',f:['Browse Binder structure and edit text, titles, synopses, and chapter status','Read continuously and annotate selected passages','Write changes in place with iCloud sync and automatic pre-write backups','Export RTF, TXT, Markdown, or a complete .scriv project'],sl:'Support',st:'Need help?',si:'Keep your project intact in the Files app or iCloud Drive before opening it.',q1t:'How do I open a project?',q1:'Choose Import or Open Project in the library, then select a .scriv folder or .scriv.zip file.',q2t:'How does one purchase work across devices?',q2:'One purchase with the same Apple Account unlocks Pro on both iPhone and iPad. Choose Restore Purchase in the paywall if needed.',ct:'Contact support',pl:'Privacy policy',pt:'Your writing belongs to you',pi:'ScrivenerBridge has no accounts, advertising SDKs, or analytics SDKs. It does not upload your writing to developer-operated servers.',pdt:'Data handling',pd:'You manage projects, text, and annotations on your device, in the Files app, or in iCloud Drive. The app reads and writes only the project you select.',pit:'iCloud',pii:'When a project is stored in iCloud Drive, syncing is handled by Apple’s iCloud service under your account settings.',pct:'Contact us',pc:'Email us with any privacy questions.'},

      'it': {n:'Italiano',t:'Scrittura mobile per Scrivener',s:'Continua veri progetti .scriv su iPhone e iPad.',ol:'Prodotto',ot:'Scrivener anche su mobile',o:'ScrivenerBridge apre direttamente veri progetti .scriv, per mantenere la scrittura lunga chiara, ordinata e pratica anche su mobile.',f:['Esplora Binder e modifica testo, titoli, sinossi e stato dei capitoli','Leggi in continuità e annota passaggi selezionati','Scrivi nel progetto con iCloud e backup automatici','Esporta RTF, TXT, Markdown o un progetto .scriv completo'],sl:'Supporto',st:'Serve aiuto?',si:'Mantieni intatta la struttura del progetto in File o iCloud Drive prima di aprirlo.',q1t:'Come apro un progetto?',q1:'Nella libreria scegli Importa o Apri progetto, poi seleziona una cartella .scriv o un file .scriv.zip.',q2t:'Come funziona un acquisto su più dispositivi?',q2:'Un acquisto con lo stesso account Apple sblocca Pro su iPhone e iPad. Se necessario scegli Ripristina acquisto.',ct:'Contatta il supporto',pl:'Privacy',pt:'Il tuo manoscritto è tuo',pi:'ScrivenerBridge non usa account, SDK pubblicitari o analitici e non carica i testi su server gestiti dallo sviluppatore.',pdt:'Trattamento dei dati',pd:'Gestisci progetti, testo e annotazioni sul dispositivo, in File o in iCloud Drive. L’app legge e scrive solo il progetto selezionato.',pit:'iCloud',pii:'Per i progetti in iCloud Drive, la sincronizzazione è gestita dal servizio iCloud di Apple secondo le impostazioni del tuo account.',pct:'Contatti',pc:'Scrivici per qualsiasi domanda sulla privacy。'},
      'pt-BR': {n:'Português',t:'Escrita móvel para Scrivener',s:'Continue projetos .scriv reais no iPhone e iPad.',ol:'Produto',ot:'Leve o Scrivener ao celular',o:'ScrivenerBridge abre projetos .scriv reais diretamente para manter a escrita longa clara, organizada e prática no celular.',f:['Navegue pelo Binder e edite texto, títulos, sinopses e status de capítulos','Leia continuamente e faça anotações em trechos selecionados','Grave no projeto com iCloud e backups automáticos','Exporte RTF, TXT, Markdown ou um projeto .scriv completo'],sl:'Suporte',st:'Precisa de ajuda?',si:'Mantenha a estrutura do projeto intacta no app Arquivos ou no iCloud Drive antes de abri-lo.',q1t:'Como abro um projeto?',q1:'Na biblioteca, escolha Importar ou Abrir projeto e selecione uma pasta .scriv ou um arquivo .scriv.zip.',q2t:'Como uma compra funciona entre dispositivos?',q2:'Uma compra com a mesma Conta Apple desbloqueia o Pro no iPhone e iPad. Use Restaurar compra se necessário.',ct:'Falar com o suporte',pl:'Política de privacidade',pt:'Seu manuscrito é seu',pi:'ScrivenerBridge não usa contas, SDKs de publicidade ou análise e não envia seus textos a servidores operados pelo desenvolvedor.',pdt:'Tratamento de dados',pd:'Você gerencia projetos, textos e anotações no dispositivo, no app Arquivos ou no iCloud Drive. O app só lê e grava o projeto selecionado.',pit:'iCloud',pii:'Em projetos no iCloud Drive, a sincronização é processada pelo serviço iCloud da Apple de acordo com sua conta.',pct:'Contato',pc:'Envie um e-mail se tiver dúvidas sobre privacidade。'},
      'ru': {n:'Русский',t:'Мобильное письмо для Scrivener',s:'Продолжайте настоящие проекты .scriv на iPhone и iPad.',ol:'Продукт',ot:'Scrivener на мобильном устройстве',o:'ScrivenerBridge напрямую открывает настоящие проекты .scriv, сохраняя ясность и порядок в работе над длинными текстами на мобильном устройстве.',f:['Просматривайте Binder и редактируйте текст, заголовки, синопсисы и статусы глав','Читайте подряд и добавляйте заметки к выбранным фрагментам','Сохраняйте изменения в проект с iCloud и автоматическими резервными копиями','Экспортируйте RTF, TXT, Markdown или весь проект .scriv'],sl:'Поддержка',st:'Нужна помощь?',si:'Перед открытием сохраните структуру проекта в «Файлах» или iCloud Drive без изменений.',q1t:'Как открыть проект?',q1:'В библиотеке выберите импорт или открытие проекта, затем папку .scriv либо файл .scriv.zip.',q2t:'Как покупка работает на нескольких устройствах?',q2:'Одна покупка с тем же аккаунтом Apple открывает Pro на iPhone и iPad. При необходимости выберите восстановление покупок.',ct:'Связаться с поддержкой',pl:'Конфиденциальность',pt:'Ваша рукопись принадлежит вам',pi:'ScrivenerBridge не использует аккаунты, рекламные или аналитические SDK и не загружает тексты на серверы разработчика.',pdt:'Обработка данных',pd:'Вы управляете проектами, текстами и заметками на устройстве, в «Файлах» или iCloud Drive. Приложение читает и записывает только выбранный проект.',pit:'iCloud',pii:'Для проектов в iCloud Drive синхронизация выполняется службой iCloud Apple согласно настройкам аккаунта.',pct:'Связаться с нами',pc:'Напишите нам по электронной почте по вопросам конфиденциальности。'},
      'nl': {n:'Nederlands',t:'Mobiel schrijven voor Scrivener',s:'Werk verder aan echte .scriv-projecten op iPhone en iPad.',ol:'Product',ot:'Scrivener op mobiel',o:'ScrivenerBridge opent echte .scriv-projecten rechtstreeks, zodat lang schrijven ook mobiel helder, overzichtelijk en praktisch blijft.',f:['Verken Binder en bewerk tekst, titels, samenvattingen en hoofdstukstatus','Lees doorlopend en annoteer geselecteerde passages','Schrijf wijzigingen in het project met iCloud en automatische back-ups','Exporteer RTF, TXT, Markdown of een volledig .scriv-project'],sl:'Ondersteuning',st:'Hulp nodig?',si:'Behoud de projectstructuur in Bestanden of iCloud Drive voordat je een project opent.',q1t:'Hoe open ik een project?',q1:'Kies in de bibliotheek Importeren of Project openen en selecteer vervolgens een .scriv-map of .scriv.zip-bestand.',q2t:'Hoe werkt één aankoop op meerdere apparaten?',q2:'Eén aankoop met dezelfde Apple-account ontgrendelt Pro op iPhone en iPad. Kies zo nodig Aankoop herstellen.',ct:'Contact opnemen',pl:'Privacybeleid',pt:'Je manuscript is van jou',pi:'ScrivenerBridge gebruikt geen accounts, advertentie-SDK’s of analyse-SDK’s en uploadt je teksten niet naar servers van de ontwikkelaar.',pdt:'Gegevensverwerking',pd:'Je beheert projecten, tekst en annotaties op je apparaat, in Bestanden of iCloud Drive. De app leest en schrijft alleen het project dat je kiest.',pit:'iCloud',pii:'Voor projecten in iCloud Drive wordt synchronisatie door Apple’s iCloud-service verwerkt volgens je accountinstellingen.',pct:'Contact',pc:'Stuur ons een e-mail met privacyvragen。'},
      'tr': {n:'Türkçe',t:'Scrivener için mobil yazım',s:'Gerçek .scriv projelerini iPhone ve iPad’de sürdürün.',ol:'Ürün',ot:'Scrivener projelerini mobile taşıyın',o:'ScrivenerBridge gerçek .scriv projelerini doğrudan açar; uzun metin yazımı mobilde de düzenli, açık ve pratik kalır.',f:['Binder yapısında gezinin; metni, başlıkları, özetleri ve bölüm durumunu düzenleyin','Kesintisiz okuyun ve seçili bölümlere not ekleyin','Değişiklikleri iCloud ve otomatik yedeklemelerle projeye yazın','RTF, TXT, Markdown veya tam .scriv projesini dışa aktarın'],sl:'Destek',st:'Yardıma mı ihtiyacınız var?',si:'Açmadan önce projenin Dosyalar veya iCloud Drive içindeki yapısını koruyun.',q1t:'Bir projeyi nasıl açarım?',q1:'Kitaplıkta İçe Aktar veya Projeyi Aç seçeneğini belirleyin; ardından .scriv klasörünü ya da .scriv.zip dosyasını seçin.',q2t:'Tek satın alma cihazlar arasında nasıl çalışır?',q2:'Aynı Apple Hesabı ile tek satın alma iPhone ve iPad’de Pro’yu açar. Gerektiğinde Satın Alımı Geri Yükle’yi seçin.',ct:'Destekle iletişim',pl:'Gizlilik politikası',pt:'Taslağınız size aittir',pi:'ScrivenerBridge hesap, reklam SDK’sı veya analiz SDK’sı kullanmaz ve metinlerinizi geliştiricinin sunucularına yüklemez.',pdt:'Veri işleme',pd:'Projeleri, metni ve notları cihazınızda, Dosyalar’da veya iCloud Drive’da siz yönetirsiniz. Uygulama yalnızca seçtiğiniz projeyi okur ve yazar.',pit:'iCloud',pii:'iCloud Drive’daki projelerde eşzamanlama, hesap ayarlarınıza göre Apple’ın iCloud hizmeti tarafından yapılır.',pct:'İletişim',pc:'Gizlilik sorularınız için bize e-posta gönderin。'}
    };
    const group = {"en-US":"en","en-GB":"en","en-CA":"en","en-AU":"en","es-ES":"es","es-MX":"es","zh-Hans":"zh-Hans","zh-Hant":"zh-Hant","ja":"ja","ko":"ko","de-DE":"de","fr-FR":"fr","it":"it","pt-BR":"pt-BR","ru":"ru","nl-NL":"nl","tr":"tr"};
    const buttons = [['zh-Hans','简体'],['zh-Hant','繁體'],['en-US','EN'],['ja','日本語'],['ko','한국어'],['de-DE','DE'],['fr-FR','FR'],['es-ES','ES'],['it','IT'],['pt-BR','PT'],['ru','RU'],['nl-NL','NL'],['tr','TR']];
    const query = new URLSearchParams(location.search).get('lang'); let locale = group[query] ? query : 'zh-Hans';
    const el = id => document.getElementById(id);
    function render(next) { locale = next; const d = translations[group[locale]]; document.documentElement.lang = locale; document.title = 'ScrivenerBridge · ' + d.t; el('title').textContent=d.t; el('subtitle').textContent=d.s; el('overviewLabel').textContent=d.ol; el('overviewTitle').textContent=d.ot; el('overview').textContent=d.o; el('features').replaceChildren(...d.f.map(x=>Object.assign(document.createElement('li'),{textContent:x}))); el('supportLabel').textContent=d.sl; el('supportTitle').textContent=d.st; el('supportIntro').textContent=d.si; el('faqOneTitle').textContent=d.q1t; el('faqOne').textContent=d.q1; el('faqTwoTitle').textContent=d.q2t; el('faqTwo').textContent=d.q2; el('contactTitle').textContent=d.ct; el('privacyLabel').textContent=d.pl; el('privacyTitle').textContent=d.pt; el('privacyIntro').textContent=d.pi; el('privacyDataTitle').textContent=d.pdt; el('privacyData').textContent=d.pd; el('privacyICloudTitle').textContent=d.pit; el('privacyICloud').textContent=d.pii; el('privacyContactTitle').textContent=d.pct; el('privacyContact').textContent=d.pc; history.replaceState(null,'','?lang='+locale+location.hash); [...el('language').children].forEach(b=>b.setAttribute('aria-pressed',String(b.dataset.locale===locale))); }
    buttons.forEach(([code,label])=>{const b=document.createElement('button');b.textContent=label;b.dataset.locale=code;b.onclick=()=>render(code);el('language').append(b);}); render(locale);
  </script>
